<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gilead System 40k – Mini Apps</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181c24;
      --panel-2: #212734;
      --text: #edf1f8;
      --muted: #adb7cc;
      --accent: #79a7ff;
      --border: #31384a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #1a2130 0%, var(--bg) 55%);
      padding: 8px;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      gap: 8px;
      height: calc(100vh - 16px);
    }

    .header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 { margin: 0; font-size: clamp(1rem, 1.5vw, 1.2rem); font-weight: 600; line-height: 1.1; }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }

    .tab {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      line-height: 1;
      cursor: pointer;
    }

    .tab.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .stage {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      min-height: 0;
      height: 100%;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #0b0f18;
    }

    iframe.active { display: block; }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <h1>Gilead System 40k – Mini App Hub</h1>
      <nav class="tabs" aria-label="App Navigation">
        <button class="tab" data-app="map">Gilead Map</button>
        <button class="tab" data-app="npc">NPC Tracker</button>
      </nav>
    </header>

    <section class="stage" aria-live="polite">
      <iframe id="view-map" title="Gilead Map" src="./Gilead-map.html" loading="eager"></iframe>
      <iframe id="view-npc" title="NPC Tracker" src="./npc-tracker.html" loading="eager"></iframe>
    </section>
  </main>

  <script>
    const views = {
      map: document.getElementById('view-map'),
      npc: document.getElementById('view-npc')
    };

    const tabs = Array.from(document.querySelectorAll('.tab'));

    function show(app) {
      const key = views[app] ? app : 'map';
      Object.entries(views).forEach(([name, frame]) => {
        frame.classList.toggle('active', name === key);
      });
      tabs.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.app === key);
      });
      history.replaceState(null, '', `#${key}`);
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => show(btn.dataset.app));
    });

    window.addEventListener('hashchange', () => {
      show((location.hash || '').replace('#', ''));
    });

    show((location.hash || '').replace('#', '') || 'map');
  </script>
</body>
</html>
