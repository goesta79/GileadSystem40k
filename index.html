<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gilead System 40k – Mini Apps</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181c24;
      --panel-2: #212734;
      --text: #edf1f8;
      --muted: #adb7cc;
      --accent: #79a7ff;
      --border: #31384a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #1a2130 0%, var(--bg) 55%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .wrap {
      width: min(900px, 100%);
      display: grid;
      gap: 14px;
    }

    .hero {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    h1 { margin: 0 0 8px; font-size: clamp(1.4rem, 3vw, 2rem); }
    p { margin: 0; color: var(--muted); }

    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .title { font-size: 1.1rem; font-weight: 700; }
    .desc { color: var(--muted); min-height: 42px; }

    a.button {
      display: inline-block;
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }

    a.button:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Gilead System 40k – Mini App Hub</h1>
      <p>Wähle eine der beiden lokalen Mini-Apps aus.</p>
    </section>

    <section class="apps">
      <article class="card">
        <div class="title">Gilead Map</div>
        <div class="desc">Bestehende Sternsystem-/Karten-Visualisierung.</div>
        <a class="button" href="./Gilead-map.html">Zur Gilead-Map</a>
      </article>

      <article class="card">
        <div class="title">NPC Tracker</div>
        <div class="desc">Wrath & Glory Kampf-Tracker für NPC-Statblöcke (Wounds, Shock, Conditions, Notizen).</div>
        <a class="button" href="./npc-tracker.html">Zum NPC-Tracker</a>
      </article>
    </section>
  </main>
</body>
</html>
