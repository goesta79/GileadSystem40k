<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gilead System 40k</title>
  <style>
    :root {
      --bg: #0b0f18;
      --panel: rgba(22, 27, 39, 0.86);
      --border: rgba(121, 167, 255, 0.35);
      --text: #edf1f8;
      --accent: #79a7ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
    }

    .viewport {
      position: fixed;
      inset: 1px; /* Alibi-Pixel-Rand */
      overflow: hidden;
      border-radius: 8px;
      background: #080b11;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #080b11;
    }

    iframe.active { display: block; }

    .switcher {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 9999;
      display: grid;
      gap: 6px;
      justify-items: end;
    }

    .switch-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .switch-list {
      display: none;
      gap: 6px;
      grid-template-columns: 1fr;
      width: max-content;
    }

    .switcher.open .switch-list { display: grid; }

    .mode-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      min-width: 128px;
    }

    .mode-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 45%, transparent);
    }
  </style>
</head>
<body>
  <div class="viewport" aria-live="polite">
    <iframe id="view-map" title="Gilead Map" src="./Gilead-map.html" loading="eager"></iframe>
    <iframe id="view-npc" title="NPC Tracker" src="./npc-tracker.html" loading="eager"></iframe>
  </div>

  <div class="switcher" id="switcher">
    <button class="switch-btn" id="toggleSwitcher" aria-expanded="false" aria-controls="switchList">Umschalten</button>
    <div class="switch-list" id="switchList">
      <button class="mode-btn" data-app="map">Gilead Map</button>
      <button class="mode-btn" data-app="npc">NPC Tracker</button>
    </div>
  </div>

  <script>
    const views = {
      map: document.getElementById('view-map'),
      npc: document.getElementById('view-npc')
    };

    const switcher = document.getElementById('switcher');
    const toggleSwitcher = document.getElementById('toggleSwitcher');
    const modeButtons = Array.from(document.querySelectorAll('.mode-btn'));

    function show(app) {
      const key = views[app] ? app : 'map';
      Object.entries(views).forEach(([name, frame]) => {
        frame.classList.toggle('active', name === key);
      });
      modeButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.app === key);
      });
      history.replaceState(null, '', `#${key}`);
    }

    function closeMenu() {
      switcher.classList.remove('open');
      toggleSwitcher.setAttribute('aria-expanded', 'false');
    }

    toggleSwitcher.addEventListener('click', () => {
      const open = switcher.classList.toggle('open');
      toggleSwitcher.setAttribute('aria-expanded', String(open));
    });

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        show(btn.dataset.app);
        closeMenu();
      });
    });

    window.addEventListener('hashchange', () => {
      show((location.hash || '').replace('#', ''));
    });

    window.addEventListener('click', (event) => {
      if (!switcher.contains(event.target)) {
        closeMenu();
      }
    });

    show((location.hash || '').replace('#', '') || 'map');
  </script>
</body>
</html>
